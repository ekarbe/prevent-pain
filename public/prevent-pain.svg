<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%" fill="none">
  <defs>
    <linearGradient id="flexAlignGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" /> <!-- sky-500 -->
      <stop offset="100%" stop-color="#0d9488" /> <!-- teal-600 -->
    </linearGradient>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer circle with gap -->
  <circle cx="32" cy="32" r="24" stroke="url(#flexAlignGrad)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="112 38" transform="rotate(-60 32 32)" />
  
  <!-- Middle circle with gap -->
  <circle cx="32" cy="32" r="16" stroke="url(#flexAlignGrad)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="76 24" transform="rotate(30 32 32)" opacity="0.85" />
  
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="8" stroke="url(#flexAlignGrad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="38 12" transform="rotate(120 32 32)" opacity="0.7" />
  
  <!-- Pivot Arm -->
  <line x1="32" y1="32" x2="52" y2="12" stroke="url(#flexAlignGrad)" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Joint Node -->
  <circle cx="52" cy="12" r="5" fill="url(#flexAlignGrad)" filter="url(#subtleGlow)" />
</svg>
